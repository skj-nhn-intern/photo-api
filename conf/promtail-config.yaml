# Promtail Configuration for Photo API
# LOKI_URL = Loki 베이스 URL만 (예: http://192.168.4.73:3100, 끝에 / 및 경로 없음). /loki/api/v1/push 는 자동 추가됨.
# INSTANCE_IP = 인스턴스 식별용 (선택). systemd EnvironmentFile=/etc/default/photo-api 또는 wrapper에서 로드.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn
  # 메모리 최적화: 로그 레벨을 warn으로 유지하여 디버그 로그 최소화

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    # 메모리 최적화: 배치 크기 감소 (1MB → 512KB)
    batchsize: 524288  # 512KB (기본값 1MB의 절반)
    # 메모리 최적화: 배치 대기 시간 증가 (더 많은 로그를 모아서 전송)
    batchwait: 2s  # 1s → 2s (메모리 사용량 감소)
    timeout: 30s
    # 메모리 최적화: 외부 요청 타임아웃
    tenant_id: ""

scrape_configs:
  - job_name: photo-api
    static_configs:
      - targets: [localhost]
        labels:
          job: photo-api
          app: photo-api
          env: production
          instance: ${INSTANCE_IP}
          __path__: /var/log/photo-api/app.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            instance_ip: instance_ip
            host: host
            event: event
            level: level
            http_path: http_path
      - template:
          source: instance_ip
          template: '{{ or .instance_ip .host }}'
      - labels:
          instance_ip: instance_ip
      # 서비스 모니터링용 라벨: event(이벤트별 건수), level(ERROR/WARNING 비율), path_prefix(서비스별 필터)
      - labels:
          event: event
      - labels:
          level: level
      # http_path에서 서비스 구간 추출 → path_prefix 라벨 (/auth, /albums, /photos, /share)
      # 메모리 최적화: regex를 더 효율적으로 (선택적 매칭)
      - regex:
          source: http_path
          expression: '^(?P<path_prefix>/auth|/albums|/photos|/share)'
      - labels:
          path_prefix: path_prefix
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z07:00"

  - job_name: photo-api-errors
    static_configs:
      - targets: [localhost]
        labels:
          job: photo-api
          app: photo-api
          env: production
          instance: ${INSTANCE_IP}
          log_type: error
          __path__: /var/log/photo-api/error.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            instance_ip: instance_ip
            host: host
            event: event
            level: level
            http_path: http_path
      - template:
          source: instance_ip
          template: '{{ or .instance_ip .host }}'
      - labels:
          instance_ip: instance_ip
      - labels:
          event: event
      - labels:
          level: level
      - regex:
          source: http_path
          expression: '^(?P<path_prefix>/auth|/albums|/photos|/share)'
      - labels:
          path_prefix: path_prefix
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z07:00"

  - job_name: journal
    journal:
      json: false
      # 메모리 최적화: journal 최대 나이 감소 (12h → 6h)
      max_age: 6h  # 12h → 6h (메모리 사용량 감소)
      path: /var/log/journal
      labels:
        job: systemd
        instance: ${INSTANCE_IP}
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        regex: '(photo-api|promtail)\.service'
        action: keep
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
